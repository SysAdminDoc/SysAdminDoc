name: Local validation or setup problem
description: Report a problem with local validation, setup, or generated profile output.
title: "Validation issue: "
labels:
  - validation
  - support
body:
  - type: markdown
    attributes:
      value: "This repo is public. Do not paste secrets, tokens, private repository names, customer data, medical data, or sensitive logs. Redact anything non-public before submitting."
  - type: input
    id: check
    attributes:
      label: Command or script
      description: Which script or validation step failed?
      placeholder: "Example: scripts/validate-local.ps1, scripts/render-profile-smoke.ps1, setup.ps1 -CheckOnly"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: PowerShell version, OS, and any relevant tool versions.
      placeholder: "Example: PowerShell 7.4.6 on Windows 11 24H2"
    validations:
      required: false
  - type: textarea
    id: observed
    attributes:
      label: What happened?
      description: Paste the error output or describe the failure. Redact any sensitive paths or data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should the command produce or do?
    validations:
      required: true
  - type: dropdown
    id: sensitive
    attributes:
      label: Does this involve sensitive data?
      description: If yes, do not submit this issue. Use the security policy instead.
      options:
        - "No"
        - "Yes -- I will use SECURITY.md instead"
    validations:
      required: true
