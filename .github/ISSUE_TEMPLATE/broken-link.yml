name: Broken catalog link
description: Report a README, release, launch, install, or portfolio link that returns an error or wrong destination.
title: "Broken link: "
labels:
  - broken-link
  - profile-catalog
body:
  - type: markdown
    attributes:
      value: "This repo is public. Do not include private repository names, credentials, customer data, medical data, or other sensitive details in any field."
  - type: input
    id: project
    attributes:
      label: Project or section
      description: Name the project row or README section where the broken link appears.
      placeholder: "Example: OpenCut, Start Here, PowerShell System Utilities"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Broken URL
      description: Paste the full URL exactly as shown in the README or portfolio.
      placeholder: "https://github.com/SysAdminDoc/example/releases/latest"
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: What happened?
      description: Describe what you saw -- 404, redirect loop, wrong download, browser error, etc.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should the link open or download?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did you find the broken link?
      options:
        - GitHub profile README
        - Full portfolio site
        - Release download page
        - Install snippet (PowerShell one-liner)
        - Other
    validations:
      required: true
