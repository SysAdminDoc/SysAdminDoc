name: Workflow or validation problem
description: Report a public CI, generated-profile validation, or workflow automation problem.
title: "Workflow issue: "
labels:
  - workflow
  - validation
body:
  - type: markdown
    attributes:
      value: "Do not paste secrets, tokens, private repository names, or sensitive logs. Redact anything non-public before submitting."
  - type: input
    id: workflow
    attributes:
      label: Workflow or check name
      placeholder: "Example: Profile sync, Tests / Pester, OpenSSF Scorecard"
    validations:
      required: true
  - type: input
    id: run
    attributes:
      label: Public run or PR URL
      placeholder: "https://github.com/SysAdminDoc/SysAdminDoc/actions/runs/..."
    validations:
      required: false
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: Summarize the failure, missing check, or unexpected output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should the workflow or validation check do?
    validations:
      required: true
  - type: dropdown
    id: sensitive
    attributes:
      label: Does this involve sensitive data?
      description: If yes, do not submit the issue. Use the security policy instead.
      options:
        - "No"
        - "Yes - I will use SECURITY.md instead"
    validations:
      required: true
