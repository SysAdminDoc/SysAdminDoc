name: Profile or catalog correction
description: Suggest a public-safe correction to profile copy, project metadata, category, or action labels.
title: "Profile correction: "
labels:
  - profile-catalog
  - correction
body:
  - type: markdown
    attributes:
      value: "This repo is public. Do not include private repo names, customer data, medical data, or employer-specific details in any field."
  - type: input
    id: project
    attributes:
      label: Public project or section
      description: Name the project row or README section where the correction applies.
      placeholder: "Example: Vantage, Start Here, PowerShell System Utilities"
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current text or metadata
      description: Paste the exact public text or describe the current catalog value you want corrected.
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed correction
      description: Describe the exact change -- wording, category, action label, or metadata value.
    validations:
      required: true
  - type: dropdown
    id: generated
    attributes:
      label: Is this in the generated catalog section?
      description: "Catalog sections (below the Start Here table) are generated from `data/profile-catalog.json`. Changes there must go through the catalog, not README edits."
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true
