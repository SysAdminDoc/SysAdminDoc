version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "08:17"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      routine-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "08:23"
      timezone: "America/New_York"
    open-pull-requests-limit: 2
