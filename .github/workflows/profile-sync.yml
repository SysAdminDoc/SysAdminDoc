name: Profile sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run check only or open a PR with generated profile changes."
        required: true
        default: "check"
        type: choice
        options:
          - check
          - dry-run-pr
          - write-pr
  pull_request:
  merge_group:
  schedule:
    - cron: "37 7 * * 2,5"

concurrency:
  group: profile-sync-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    name: Check generated README
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'check'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Validate generated profile
        if: ${{ github.event_name != 'workflow_dispatch' || !startsWith(github.ref_name, 'automation/profile-') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/sync-profile.ps1 -Check

      - name: Validate generated profile branch
        if: ${{ github.event_name == 'workflow_dispatch' && startsWith(github.ref_name, 'automation/profile-') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/sync-profile.ps1 -Write -Check

      - name: Smoke live rendered profile
        shell: pwsh
        run: ./scripts/render-profile-smoke.ps1

      - name: Write sync report summary
        if: always()
        shell: pwsh
        run: ./scripts/write-profile-sync-summary.ps1 -Context "Profile sync" -AllowMissing

      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: profile-sync-report
          path: reports/profile-sync-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload rendered profile smoke artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: rendered-profile-smoke
          path: |
            reports/rendered-profile-smoke.json
            reports/rendered-profile-smoke-*.png
          if-no-files-found: warn
          retention-days: 14

  write-pr:
    name: Open generated README PR
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'write-pr'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Regenerate profile
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/sync-profile.ps1 -Write -Check

      - name: Write sync report summary
        if: always()
        shell: pwsh
        run: ./scripts/write-profile-sync-summary.ps1 -Context "Generated profile PR" -AllowMissing

      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: profile-sync-report
          path: reports/profile-sync-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Create pull request
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/open-generated-profile-pr.ps1 `
            -BranchPrefix "automation/profile-sync-" `
            -CommitMessage "chore: sync generated profile" `
            -PullRequestTitle "chore: sync generated profile" `
            -PullRequestBodyIntro "Regenerates the profile README from data/profile-catalog.json and live GitHub metadata." `
            -NoChangesMessage "No generated profile changes." `
            -NoStagedChangesMessage "No staged profile changes."

  dry-run-pr:
    name: Preview generated README PR
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run-pr'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Regenerate profile
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/sync-profile.ps1 -Write -Check

      - name: Write sync report summary
        if: always()
        shell: pwsh
        run: ./scripts/write-profile-sync-summary.ps1 -Context "Generated profile PR dry run" -AllowMissing

      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: profile-sync-report
          path: reports/profile-sync-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Preview pull request
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/open-generated-profile-pr.ps1 `
            -BranchPrefix "automation/profile-sync-" `
            -CommitMessage "chore: sync generated profile" `
            -PullRequestTitle "chore: sync generated profile" `
            -PullRequestBodyIntro "Regenerates the profile README from data/profile-catalog.json and live GitHub metadata." `
            -NoChangesMessage "No generated profile changes." `
            -NoStagedChangesMessage "No staged profile changes." `
            -DryRun
