name: Profile sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run check only or open a PR with generated profile changes."
        required: true
        default: "check"
        type: choice
        options:
          - check
          - dry-run-pr
          - write-pr
  pull_request:
  merge_group:
  schedule:
    - cron: "37 7 * * 2,5"

concurrency:
  group: profile-sync-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    name: Check generated README
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'check'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Validate generated profile
        if: ${{ github.event_name != 'workflow_dispatch' || !startsWith(github.ref_name, 'automation/profile-') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/sync-profile.ps1 -Check

      - name: Validate generated profile branch
        if: ${{ github.event_name == 'workflow_dispatch' && startsWith(github.ref_name, 'automation/profile-') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/sync-profile.ps1 -Write -Check

      - name: Smoke live rendered profile
        if: ${{ !cancelled() }}
        shell: pwsh
        run: ./scripts/render-profile-smoke.ps1

      - name: Write sync report summary
        if: ${{ !cancelled() }}
        shell: pwsh
        run: ./scripts/write-profile-sync-summary.ps1 -Context "Profile sync" -AllowMissing

      - name: Upload sync report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: profile-sync-report
          path: reports/profile-sync-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload rendered profile smoke artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rendered-profile-smoke
          path: |
            reports/rendered-profile-smoke.json
            reports/rendered-profile-smoke-*.png
          if-no-files-found: warn
          retention-days: 14

  write-pr:
    name: Open generated README PR
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'write-pr'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      attestations: write
      contents: write
      id-token: write
      pull-requests: write
      statuses: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Regenerate profile
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/sync-profile.ps1 -Write -Check

      - name: Write sync report summary
        if: ${{ !cancelled() }}
        shell: pwsh
        run: ./scripts/write-profile-sync-summary.ps1 -Context "Generated profile PR" -AllowMissing

      - name: Upload sync report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: profile-sync-report
          path: reports/profile-sync-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Attest projects.json provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: projects.json

      - name: Create pull request
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/open-generated-profile-pr.ps1 `
            -BranchPrefix "automation/profile-sync-" `
            -CommitMessage "chore: sync generated profile" `
            -PullRequestTitle "chore: sync generated profile" `
            -PullRequestBodyIntro "Regenerates the profile README from data/profile-catalog.json and live GitHub metadata." `
            -NoChangesMessage "No generated profile changes." `
            -NoStagedChangesMessage "No staged profile changes."

  generated-validation-status:
    name: Generated profile validation status
    if: ${{ always() && github.event_name == 'workflow_dispatch' && startsWith(github.ref_name, 'automation/profile-') }}
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Publish generated validation status
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $state = if ('${{ needs.check.result }}' -eq 'success') { 'success' } else { 'failure' }
          ./scripts/set-generated-validation-status.ps1 `
            -State $state `
            -Description "Generated profile validation ${{ needs.check.result }}."

  dry-run-pr:
    name: Preview generated README PR
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run-pr'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Regenerate profile
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/sync-profile.ps1 -Write -Check

      - name: Write sync report summary
        if: ${{ !cancelled() }}
        shell: pwsh
        run: ./scripts/write-profile-sync-summary.ps1 -Context "Generated profile PR dry run" -AllowMissing

      - name: Upload sync report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: profile-sync-report
          path: reports/profile-sync-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Preview pull request
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/open-generated-profile-pr.ps1 `
            -BranchPrefix "automation/profile-sync-" `
            -CommitMessage "chore: sync generated profile" `
            -PullRequestTitle "chore: sync generated profile" `
            -PullRequestBodyIntro "Regenerates the profile README from data/profile-catalog.json and live GitHub metadata." `
            -NoChangesMessage "No generated profile changes." `
            -NoStagedChangesMessage "No staged profile changes." `
            -DryRun
