name: Profile sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run check only or open a PR with generated profile changes."
        required: true
        default: "check"
        type: choice
        options:
          - check
          - write-pr
  pull_request:
  merge_group:
  schedule:
    - cron: "37 7 * * 2,5"

concurrency:
  group: profile-sync-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    name: Check generated README
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'check'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Validate generated profile
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/sync-profile.ps1 -Check

      - name: Smoke live rendered profile
        shell: pwsh
        run: ./scripts/render-profile-smoke.ps1

      - name: Write sync report summary
        if: always()
        shell: pwsh
        run: ./scripts/write-profile-sync-summary.ps1 -Context "Profile sync" -AllowMissing

      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: profile-sync-report
          path: reports/profile-sync-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload rendered profile smoke artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rendered-profile-smoke
          path: |
            reports/rendered-profile-smoke.json
            reports/rendered-profile-smoke-*.png
          if-no-files-found: warn
          retention-days: 14

  write-pr:
    name: Open generated README PR
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'write-pr'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Regenerate profile
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/sync-profile.ps1 -Write -Check

      - name: Write sync report summary
        if: always()
        shell: pwsh
        run: ./scripts/write-profile-sync-summary.ps1 -Context "Generated profile PR" -AllowMissing

      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: profile-sync-report
          path: reports/profile-sync-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Create pull request
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # `git diff --quiet` signals "no changes" via exit code 0, not via stdout.
          # In PowerShell `if (native-cmd)` tests stdout truthiness, so the old guard
          # never fired and clean runs failed on an empty commit. Test $LASTEXITCODE.
          git diff --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No generated profile changes."
            exit 0
          }

          $branch = "automation/profile-sync-${{ github.run_id }}"
          git switch -c $branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md projects.json reports/profile-sync-report.json assets/profile/*.svg
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No staged profile changes."
            exit 0
          }
          git commit -m "chore: sync generated profile"
          git config --local http.https://github.com/.extraheader "Authorization: basic $([Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:GH_TOKEN")))"
          git push origin $branch
          $validationQuery = [uri]::EscapeDataString("branch:$branch")
          $validationRunsUrl = "https://github.com/${{ github.repository }}/actions/workflows/profile-sync.yml?query=$validationQuery"
          $prBody = @"
          Regenerates the profile README from data/profile-catalog.json and live GitHub metadata.

          Validation handoff: this workflow dispatches Profile sync in check mode on the generated branch after opening the pull request.
          Validation runs: $validationRunsUrl
          "@
          $prUrl = gh pr create `
            --base main `
            --head $branch `
            --title "chore: sync generated profile" `
            --body $prBody
          gh workflow run profile-sync.yml --ref $branch -f mode=check
          if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_STEP_SUMMARY)) {
            @(
              "### Generated profile PR validation handoff"
              ""
              "- Pull request: $prUrl"
              "- Dispatched: Profile sync check on `$branch`"
              "- Validation runs: $validationRunsUrl"
            ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
