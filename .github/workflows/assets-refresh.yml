name: Profile assets refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "19 8 * * 3"

concurrency:
  group: profile-assets-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    name: Refresh committed profile SVGs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Regenerate profile assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/sync-profile.ps1 -Write -Check

      - name: Write sync report summary
        if: always()
        shell: pwsh
        run: ./scripts/write-profile-sync-summary.ps1 -Context "Profile assets refresh" -AllowMissing

      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: profile-assets-sync-report
          path: reports/profile-sync-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Create pull request
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git diff --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No profile asset changes."
            exit 0
          }

          $branch = "automation/profile-assets-${{ github.run_id }}"
          git switch -c $branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md projects.json reports/profile-sync-report.json assets/profile/*.svg
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No staged profile asset changes."
            exit 0
          }
          git commit -m "chore: refresh profile assets"
          git config --local http.https://github.com/.extraheader "Authorization: basic $([Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$env:GH_TOKEN")))"
          git push origin $branch
          gh pr create `
            --base main `
            --head $branch `
            --title "chore: refresh profile assets" `
            --body "Regenerates committed profile SVG assets, README, project feed, and sync report from data/profile-catalog.json plus live GitHub metadata."
