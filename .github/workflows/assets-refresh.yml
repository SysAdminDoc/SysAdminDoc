name: Profile assets refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "19 8 * * 3"

concurrency:
  group: profile-assets-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    name: Refresh committed profile SVGs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Regenerate profile assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/sync-profile.ps1 -Write -Check

      - name: Write sync report summary
        if: ${{ !cancelled() }}
        shell: pwsh
        run: ./scripts/write-profile-sync-summary.ps1 -Context "Profile assets refresh" -AllowMissing

      - name: Upload sync report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: profile-assets-sync-report
          path: reports/profile-sync-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Create pull request
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/open-generated-profile-pr.ps1 `
            -BranchPrefix "automation/profile-assets-" `
            -CommitMessage "chore: refresh profile assets" `
            -PullRequestTitle "chore: refresh profile assets" `
            -PullRequestBodyIntro "Regenerates committed profile SVG assets, README, project feed, and sync report from data/profile-catalog.json plus live GitHub metadata." `
            -NoChangesMessage "No profile asset changes." `
            -NoStagedChangesMessage "No staged profile asset changes."
