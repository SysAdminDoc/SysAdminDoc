name: Dependabot auto-merge

on:
  # pull_request_target is intentional: Dependabot PRs require base-branch
  # token permissions to enable auto-merge. The job is hardened with empty
  # workflow-level permissions, narrow job-level write scopes, actor and
  # repository checks, and no checkout of PR code.
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  github-actions-minor-patch:
    name: GitHub Actions minor/patch auto-merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      ${{
        github.event.pull_request.user.login == 'dependabot[bot]' &&
        github.repository == 'SysAdminDoc/SysAdminDoc' &&
        github.event.pull_request.draft == false
      }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98

      - name: Enable auto-merge for minor and patch Actions updates
        if: >-
          ${{
            steps.metadata.outputs.package-ecosystem == 'github-actions' &&
            (
              steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
              steps.metadata.outputs.update-type == 'version-update:semver-patch'
            )
          }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --merge "$PR_URL"

      - name: Record skipped Dependabot update
        if: >-
          ${{
            steps.metadata.outputs.package-ecosystem != 'github-actions' ||
            (
              steps.metadata.outputs.update-type != 'version-update:semver-minor' &&
              steps.metadata.outputs.update-type != 'version-update:semver-patch'
            )
          }}
        env:
          PKG_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          echo "Dependabot PR was not eligible for auto-merge."
          echo "package-ecosystem=$PKG_ECOSYSTEM"
          echo "update-type=$UPDATE_TYPE"
