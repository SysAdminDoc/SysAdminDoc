name: Tests

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "setup.ps1"
      - "PSScriptAnalyzerSettings.psd1"
      - "schemas/**"
      - "tests/**"
      - "README.md"
      - "SECURITY.md"
      - ".github/**"
      - ".markdownlint-cli2.yaml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/tests.yml"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Force -Scope CurrentUser
          $findings = @(
            Invoke-ScriptAnalyzer -Path scripts -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
            Invoke-ScriptAnalyzer -Path setup.ps1 -Settings ./PSScriptAnalyzerSettings.psd1
          )
          $findings | Format-Table -AutoSize
          if ($findings.Count -gt 0) {
            throw "PSScriptAnalyzer reported $($findings.Count) finding(s)."
          }

  pester:
    name: Pester (offline)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Run Pester
        shell: pwsh
        run: |
          # PowerShell baseline: scripts require 7.0+ (#Requires -Version 7.0).
          # Tested against PowerShell 7.6 LTS (the ubuntu-latest runner's bundled
          # pwsh); no 7.6-specific behavior changes are required. The version is
          # printed so the tested runtime is recorded in the CI logs.
          Write-Host "PowerShell runtime: $($PSVersionTable.PSVersion)"
          # Coverage floor: set a few points below the established baseline so
          # routine churn passes but a meaningful coverage regression fails CI.
          # Baseline at adoption: ~81% line coverage of scripts/sync-profile.ps1.
          $coverageFloor = 78.0
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests'
          $config.Run.Throw = $true
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = 'scripts/sync-profile.ps1'
          $config.CodeCoverage.UseBreakpoints = $false
          $config.CodeCoverage.CoveragePercentTarget = $coverageFloor
          $result = Invoke-Pester -Configuration $config
          $coverage = $result.CodeCoverage
          if ($null -eq $coverage) {
            throw "Pester did not return a code coverage result."
          }
          $coveragePercent = [math]::Round([decimal]$coverage.CoveragePercent, 2)
          $coverageLine = "Pester coverage: $coveragePercent% ($($coverage.CommandsExecutedCount)/$($coverage.CommandsAnalyzedCount) commands) across $($coverage.FilesAnalyzedCount) file(s). Floor: $coverageFloor%."
          Write-Host $coverageLine
          if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_STEP_SUMMARY)) {
            @(
              "### Pester coverage"
              ""
              "| Metric | Value |"
              "| --- | ---: |"
              "| Coverage | $coveragePercent% |"
              "| Floor | $coverageFloor% |"
              "| Commands covered | $($coverage.CommandsExecutedCount) / $($coverage.CommandsAnalyzedCount) |"
              "| Files analyzed | $($coverage.FilesAnalyzedCount) |"
              ""
            ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
          if ($coveragePercent -lt $coverageFloor) {
            Write-Output "::error::Pester coverage $coveragePercent% is below the $coverageFloor% floor."
            throw "Pester coverage $coveragePercent% dropped below the documented $coverageFloor% floor."
          }

  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: npm

      - name: Run markdownlint
        run: |
          npm ci
          npm run lint:markdown

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Review dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          show-openssf-scorecard: false

  windows-setup-smoke:
    name: Windows setup smoke
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Parse setup.ps1 with Windows PowerShell
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path .\setup.ps1), [ref]$tokens, [ref]$errors) > $null
          if ($errors) {
            $errors | Format-List * -Force
            throw "setup.ps1 has $($errors.Count) Windows PowerShell parser error(s)."
          }

      - name: Run setup check-only diagnostics
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\setup.ps1 -CheckOnly
