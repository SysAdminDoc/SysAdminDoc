name: Tests

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "setup.ps1"
      - "PSScriptAnalyzerSettings.psd1"
      - "schemas/**"
      - "tests/**"
      - ".github/workflows/tests.yml"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Force -Scope CurrentUser
          $findings = @(
            Invoke-ScriptAnalyzer -Path scripts -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
            Invoke-ScriptAnalyzer -Path setup.ps1 -Settings ./PSScriptAnalyzerSettings.psd1
          )
          $findings | Format-Table -AutoSize
          if ($findings.Count -gt 0) {
            throw "PSScriptAnalyzer reported $($findings.Count) finding(s)."
          }

  pester:
    name: Pester (offline)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Run Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests'
          $config.Run.Throw = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  windows-setup-smoke:
    name: Windows setup smoke
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Parse setup.ps1 with Windows PowerShell
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path .\setup.ps1), [ref]$tokens, [ref]$errors) > $null
          if ($errors) {
            $errors | Format-List * -Force
            throw "setup.ps1 has $($errors.Count) Windows PowerShell parser error(s)."
          }

      - name: Run setup check-only diagnostics
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\setup.ps1 -CheckOnly
