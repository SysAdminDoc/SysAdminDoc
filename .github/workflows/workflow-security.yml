name: Workflow security

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  schedule:
    - cron: "17 9 * * 3"

concurrency:
  group: workflow-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          curl -fsSLo actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint
          actionlint -version

      - name: Lint workflows
        run: actionlint .github/workflows/*.yml

      - name: Install zizmor
        run: >-
          python -m pip install --disable-pip-version-check --no-deps
          --require-hashes --only-binary=:all: -r requirements-ci.txt

      - name: Audit workflows and local actions
        run: zizmor --strict-collection --collect=workflows --collect=actions .github

      - name: Install poutine
        env:
          POUTINE_VERSION: "1.1.6"
          POUTINE_SHA256: "abde716599a65608b023a69ed9316e5f083a7bca48612151c2720835883757ea"
        run: |
          curl -fsSLo poutine.tar.gz "https://github.com/boostsecurityio/poutine/releases/download/v${POUTINE_VERSION}/poutine_Linux_x86_64.tar.gz"
          echo "${POUTINE_SHA256}  poutine.tar.gz" | sha256sum -c -
          tar -xzf poutine.tar.gz poutine
          sudo install -m 0755 poutine /usr/local/bin/poutine
          poutine version

      - name: Scan workflows with poutine
        run: poutine analyze_local .github/workflows || true
