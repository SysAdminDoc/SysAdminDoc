config:
  default: true
  MD013: false
  MD031: false
  MD033:
    allowed_elements:
      - a
      - b
      - br
      - code
      - details
      - i
      - img
      - kbd
      - p
      - picture
      - sub
      - source
      - summary
  MD034: false
  MD041: false
  MD060: false

globs:
  - "README.md"
  - "SECURITY.md"
  - ".github/pull_request_template.md"
  - ".github/CONTRIBUTING.md"
  - ".github/CODE_OF_CONDUCT.md"

ignores:
  - "AGENTS.md"
  - "CHANGELOG.md"
  - "CLAUDE.md"
  - "CODEX_CHANGELOG.md"
  - "CONTINUATION_PROMPT.md"
  - "PROJECT_CONTEXT.md"
  - "RESEARCH.md"
  - "TODO.md"
  - "ROADMAP.md"
  - "Roadmap_Blocked.md"
  - "RESEARCH_FEATURE_PLAN.md"
  - "node_modules"
